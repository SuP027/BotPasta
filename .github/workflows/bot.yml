name: Bot Telegram Ofertas

on:
  schedule:
    - cron: '*/5 * * * *'   # a cada 5 minutos (mínimo do GitHub free)
  workflow_dispatch:          # permite rodar manualmente
  repository_dispatch:        # permite disparar via API (cron-job.org)
    types: [trigger_bot]

# Permissões EXPLÍCITAS — sem isso o schedule não dispara
permissions:
  contents: read
  actions: read

jobs:
  enviar-ofertas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Rodar bot (envio de 1 oferta)
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          ANUNCIOS_POR_CICLO: ${{ vars.ANUNCIOS_POR_CICLO || secrets.ANUNCIOS_POR_CICLO || '1' }}
        run: node bot-telegram-ofertas.js
